<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="12">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" letter-spacing="0.5">ClawBound Runtime Architecture</text>
  <text x="550" y="56" text-anchor="middle" font-size="11" fill="#64748b">Bounded sparse-context execution pipeline with trace-native observability</text>

  <!-- ======================== -->
  <!-- STAGE 1: Task Input      -->
  <!-- ======================== -->
  <g transform="translate(40, 80)">
    <rect width="200" height="70" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#shadow)"/>
    <rect width="200" height="24" rx="8" fill="#1e293b"/>
    <rect y="12" width="200" height="12" fill="#1e293b"/>
    <text x="100" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">1. TASK INPUT</text>
    <text x="12" y="42" font-size="10" fill="#334155">userInput, sessionId,</text>
    <text x="12" y="55" font-size="10" fill="#334155">localContext[], candidateTools[]</text>
  </g>

  <!-- Arrow 1->2 -->
  <line x1="240" y1="115" x2="280" y2="115" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ======================== -->
  <!-- STAGE 2: Route Planning  -->
  <!-- ======================== -->
  <g transform="translate(290, 80)">
    <rect width="230" height="70" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="230" height="24" rx="8" fill="#2563eb"/>
    <rect y="12" width="230" height="12" fill="#2563eb"/>
    <text x="115" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">2. ROUTE PLANNING</text>
    <text x="12" y="42" font-size="10" fill="#334155">taskType | complexity | risk</text>
    <text x="12" y="55" font-size="10" fill="#334155">domainSpecificity | executionMode</text>
  </g>

  <!-- Execution modes callout -->
  <g transform="translate(295, 158)">
    <rect width="220" height="78" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="10" y="15" font-size="9" font-weight="600" fill="#1e40af">Execution Modes:</text>
    <text x="10" y="28" font-size="9" fill="#3b82f6">answer          -> read only, no retrieval</text>
    <text x="10" y="40" font-size="9" fill="#3b82f6">reviewer        -> read + test, law-gated</text>
    <text x="10" y="52" font-size="9" fill="#3b82f6">executor        -> read/edit/exec, bounded</text>
    <text x="10" y="64" font-size="9" fill="#3b82f6">executor+review -> exec then self-inspect</text>
    <text x="10" y="76" font-size="9" fill="#3b82f6">architect       -> plan only, no mutation</text>
  </g>

  <!-- Arrow 2->3 -->
  <line x1="520" y1="115" x2="560" y2="115" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ======================== -->
  <!-- STAGE 3: Retrieval Gate  -->
  <!-- ======================== -->
  <g transform="translate(570, 80)">
    <rect width="230" height="70" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="230" height="24" rx="8" fill="#d97706"/>
    <rect y="12" width="230" height="12" fill="#d97706"/>
    <text x="115" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">3. RETRIEVAL GATING</text>
    <text x="12" y="42" font-size="10" fill="#334155">Deterministic gates per source type</text>
    <text x="12" y="55" font-size="10" fill="#334155">no-load is a legal outcome</text>
  </g>

  <!-- Gate detail callout -->
  <g transform="translate(575, 158)">
    <rect width="220" height="78" rx="6" fill="#fffbeb" stroke="#fde68a" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="10" y="15" font-size="9" font-weight="600" fill="#92400e">Retrieval Gates:</text>
    <text x="10" y="28" font-size="9" fill="#b45309">LAW_GATE       risk=high | mode=reviewer</text>
    <text x="10" y="40" font-size="9" fill="#b45309">PROJECT_GATE   domain=repo_specific</text>
    <text x="10" y="52" font-size="9" fill="#b45309">EPISODE_GATE   domain=continuation</text>
    <text x="10" y="64" font-size="9" fill="#b45309">NO_LOAD        no gate opened -> send</text>
    <text x="10" y="76" font-size="9" fill="#b45309">               nothing. Sparse is default.</text>
  </g>

  <!-- Arrow 3->4 -->
  <line x1="800" y1="115" x2="840" y2="115" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========================== -->
  <!-- STAGE 4: Context Budget    -->
  <!-- ========================== -->
  <g transform="translate(850, 80)">
    <rect width="210" height="70" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="210" height="24" rx="8" fill="#7c3aed"/>
    <rect y="12" width="210" height="12" fill="#7c3aed"/>
    <text x="105" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">4. CONTEXT BUDGET</text>
    <text x="12" y="42" font-size="10" fill="#334155">alwaysOnMax | retrievalMaxUnits</text>
    <text x="12" y="55" font-size="10" fill="#334155">retrievalMaxTokens | utilization</text>
  </g>

  <!-- Budget callout -->
  <g transform="translate(855, 158)">
    <rect width="200" height="54" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="10" y="15" font-size="9" font-weight="600" fill="#5b21b6">Budget enforces boundedness:</text>
    <text x="10" y="28" font-size="9" fill="#7c3aed">Max snippet: 48 tok / 280 char / 4 lines</text>
    <text x="10" y="40" font-size="9" fill="#7c3aed">Max units: 0-3 per execution mode</text>
    <text x="10" y="52" font-size="9" fill="#7c3aed">Over-budget units are dropped</text>
  </g>

  <!-- ====================================== -->
  <!-- MIDDLE ROW: Retrieval + Tool Profile   -->
  <!-- ====================================== -->

  <!-- Arrow 4 down to retrieval -->
  <line x1="955" y1="220" x2="955" y2="270" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STAGE 5: Retrieval Execution -->
  <g transform="translate(570, 280)">
    <rect width="490" height="70" rx="8" fill="#fff" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="490" height="24" rx="8" fill="#059669"/>
    <rect y="12" width="490" height="12" fill="#059669"/>
    <text x="245" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">5. RETRIEVAL EXECUTION</text>
    <text x="12" y="42" font-size="10" fill="#334155">Load seed units (laws, project notes, episode summaries) -> score by lexical overlap + priority</text>
    <text x="12" y="55" font-size="10" fill="#334155">-> rank -> select top-N within budget -> truncate snippets to bounded size -> return or return []</text>
  </g>

  <!-- STAGE 6: Tool Profile -->
  <g transform="translate(40, 280)">
    <rect width="490" height="70" rx="8" fill="#fff" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="490" height="24" rx="8" fill="#dc2626"/>
    <rect y="12" width="490" height="12" fill="#dc2626"/>
    <text x="245" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">6. TOOL PROFILE (bounded per execution mode)</text>
    <text x="12" y="42" font-size="10" fill="#334155">answer-minimal: [read_file] | review-read-only: [read_file, run_tests] | review-delegate: [+sessions_spawn]</text>
    <text x="12" y="55" font-size="10" fill="#334155">executor-bounded: [read, edit, run_tests, run_command] | plan-bounded: [read_file, run_tests]</text>
  </g>

  <!-- Tool profile callout -->
  <g transform="translate(40, 358)">
    <rect width="490" height="42" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="12" y="15" font-size="9" font-weight="600" fill="#991b1b">Denied tools are explicit, not implicit.</text>
    <text x="12" y="28" font-size="9" fill="#dc2626">A review task CANNOT write files. An answer task CANNOT execute commands. The runtime enforces this.</text>
    <text x="12" y="39" font-size="9" fill="#dc2626">Subagent delegation requires explicit scope: review-delegate-bounded profile + sessions_spawn in candidateTools.</text>
  </g>

  <!-- ====================================== -->
  <!-- PROMPT ASSEMBLY (central, large)       -->
  <!-- ====================================== -->
  <g transform="translate(100, 420)">
    <rect width="900" height="130" rx="10" fill="#fff" stroke="#0f172a" stroke-width="2" filter="url(#shadow)"/>
    <rect width="900" height="28" rx="10" fill="#0f172a"/>
    <rect y="14" width="900" height="14" fill="#0f172a"/>
    <text x="450" y="19" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">7. PROMPT ASSEMBLY (host-owned, bounded)</text>

    <!-- Assembly segments -->
    <g transform="translate(20, 40)">
      <!-- Kernel -->
      <rect width="120" height="38" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
      <text x="60" y="16" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">KERNEL</text>
      <text x="60" y="28" text-anchor="middle" font-size="8" fill="#3b82f6">context-kernel-v0</text>

      <!-- Mode instruction -->
      <rect x="130" width="130" height="38" rx="5" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1"/>
      <text x="195" y="16" text-anchor="middle" font-size="9" font-weight="600" fill="#3730a3">MODE INSTRUCTION</text>
      <text x="195" y="28" text-anchor="middle" font-size="8" fill="#4f46e5">per executionMode</text>

      <!-- Task brief -->
      <rect x="270" width="110" height="38" rx="5" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1"/>
      <text x="325" y="16" text-anchor="middle" font-size="9" font-weight="600" fill="#9d174d">TASK BRIEF</text>
      <text x="325" y="28" text-anchor="middle" font-size="8" fill="#be185d">userInput</text>

      <!-- Local context -->
      <rect x="390" width="120" height="38" rx="5" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
      <text x="450" y="16" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">LOCAL CONTEXT</text>
      <text x="450" y="28" text-anchor="middle" font-size="8" fill="#b45309">file refs, snippets</text>

      <!-- Retrieved units -->
      <rect x="520" width="140" height="38" rx="5" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
      <text x="590" y="16" text-anchor="middle" font-size="9" font-weight="600" fill="#065f46">RETRIEVED UNITS</text>
      <text x="590" y="28" text-anchor="middle" font-size="8" fill="#059669">gated, bounded, or []</text>

      <!-- Tool contract -->
      <rect x="670" width="190" height="38" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
      <text x="765" y="16" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">TOOL CONTRACT</text>
      <text x="765" y="28" text-anchor="middle" font-size="8" fill="#dc2626">allowedTools + deniedTools + notes</text>
    </g>

    <!-- Assembly stats -->
    <text x="20" y="104" font-size="9" fill="#64748b">assemblyStats: alwaysOnTokens + retrievedTokens = totalEstimatedTokens | budget utilization tracked per segment</text>
    <text x="20" y="118" font-size="9" fill="#64748b">assemblyOrder: kernel -> mode_instruction -> task_brief -> local_context -> retrieved_units -> tool_contract</text>
  </g>

  <!-- Arrows from stages 5,6 into prompt assembly -->
  <line x1="285" y1="400" x2="450" y2="420" stroke="#dc2626" stroke-width="1.2" marker-end="url(#arrow-red)" stroke-dasharray="5,3"/>
  <line x1="815" y1="350" x2="650" y2="420" stroke="#0d9488" stroke-width="1.2" marker-end="url(#arrow-teal)" stroke-dasharray="5,3"/>

  <!-- ====================================== -->
  <!-- BOTTOM ROW: Oracle + Snapshot + Events -->
  <!-- ====================================== -->

  <!-- Arrow down from prompt assembly -->
  <line x1="550" y1="550" x2="550" y2="580" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STAGE 8: Oracle Parity -->
  <g transform="translate(40, 590)">
    <rect width="310" height="64" rx="8" fill="#fff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="310" height="24" rx="8" fill="#4f46e5"/>
    <rect y="12" width="310" height="12" fill="#4f46e5"/>
    <text x="155" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">8. ORACLE PARITY CHECK</text>
    <text x="12" y="42" font-size="10" fill="#334155">Compare route, noLoad, retrievalUnits,</text>
    <text x="12" y="54" font-size="10" fill="#334155">toolProfile against frozen oracle fixtures</text>
  </g>

  <!-- STAGE 9: Shadow Snapshot -->
  <g transform="translate(400, 590)">
    <rect width="310" height="64" rx="8" fill="#fff" stroke="#0d9488" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="310" height="24" rx="8" fill="#0d9488"/>
    <rect y="12" width="310" height="12" fill="#0d9488"/>
    <text x="155" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">9. SHADOW SNAPSHOT</text>
    <text x="12" y="42" font-size="10" fill="#334155">Full run persisted as JSON: route, retrieval,</text>
    <text x="12" y="54" font-size="10" fill="#334155">prompt, tools, parity, events, timestamps</text>
  </g>

  <!-- Event Stream (right side, spanning vertically) -->
  <g transform="translate(760, 590)">
    <rect width="300" height="64" rx="8" fill="#fff" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="300" height="24" rx="8" fill="#334155"/>
    <rect y="12" width="300" height="12" fill="#334155"/>
    <text x="150" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">EVENT TRACE (every stage)</text>
    <text x="12" y="42" font-size="10" fill="#334155">task_received -> route_decided -> gate_decided</text>
    <text x="12" y="54" font-size="10" fill="#334155">-> retrieval_executed -> prompt_built -> completed</text>
  </g>

  <!-- ====================================== -->
  <!-- OUTPUT ROW                             -->
  <!-- ====================================== -->
  <g transform="translate(100, 680)">
    <rect width="900" height="56" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="450" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">OUTPUT: ClawBoundPlanRunResult</text>
    <text x="450" y="40" text-anchor="middle" font-size="10" fill="#15803d">{ runId, traceId, routePlan, retrievalPlan, promptPackage, toolProfile, parity, events, persistedPath }</text>
  </g>

  <!-- Arrow down to output -->
  <line x1="550" y1="654" x2="550" y2="680" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ====================================== -->
  <!-- KEY PRINCIPLE BANNER                   -->
  <!-- ====================================== -->
  <g transform="translate(100, 756)">
    <rect width="900" height="48" rx="8" fill="#0f172a"/>
    <text x="450" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#e2e8f0">The runtime decides what the model sees, what tools it can use, and what context it receives.</text>
    <text x="450" y="38" text-anchor="middle" font-size="11" fill="#94a3b8">The model never assembles its own prompt. No-load is legal. Every decision is traced and persisted.</text>
  </g>
</svg>
