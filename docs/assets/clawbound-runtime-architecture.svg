<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 660" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <filter id="s" x="-4%" y="-6%" width="108%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="760" height="660" rx="16" fill="#fafbfc"/>

  <!-- Title -->
  <text x="380" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a" letter-spacing="-0.3">ClawBound Runtime Architecture</text>

  <!-- Task Input -->
  <rect x="280" y="52" width="200" height="36" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#s)"/>
  <text x="380" y="75" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Task Input</text>

  <!-- Arrow: Input -> ClawBound -->
  <line x1="380" y1="88" x2="380" y2="122" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══════════════════════════════════ -->
  <!-- CLAWBOUND GOVERNANCE LAYER          -->
  <!-- ═══════════════════════════════════ -->
  <rect x="55" y="104" width="650" height="418" rx="14" fill="#eff6ff" fill-opacity="0.45" stroke="#3b82f6" stroke-width="2"/>
  <text x="80" y="122" font-size="9" font-weight="700" fill="#2563eb" letter-spacing="1">CLAWBOUND GOVERNANCE LAYER</text>

  <!-- Route Planning -->
  <rect x="255" y="132" width="250" height="38" rx="8" fill="#2563eb" filter="url(#s)"/>
  <text x="380" y="156" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Route Planning</text>

  <line x1="380" y1="170" x2="380" y2="192" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Retrieval Gating -->
  <rect x="255" y="200" width="250" height="38" rx="8" fill="#d97706" filter="url(#s)"/>
  <text x="380" y="224" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Retrieval Gating</text>

  <line x1="380" y1="238" x2="380" y2="260" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Context Budget -->
  <rect x="255" y="268" width="250" height="38" rx="8" fill="#7c3aed" filter="url(#s)"/>
  <text x="380" y="292" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Context Budget</text>

  <!-- Fork arrows to parallel row -->
  <line x1="310" y1="306" x2="215" y2="330" stroke="#475569" stroke-width="1.3" marker-end="url(#a)"/>
  <line x1="450" y1="306" x2="545" y2="330" stroke="#475569" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- Retrieval Execution -->
  <rect x="75" y="338" width="280" height="38" rx="8" fill="#059669" filter="url(#s)"/>
  <text x="215" y="362" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Retrieval Execution</text>

  <!-- Tool Profile -->
  <rect x="405" y="338" width="280" height="38" rx="8" fill="#dc2626" filter="url(#s)"/>
  <text x="545" y="362" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Tool Profile</text>

  <!-- Merge arrows to Prompt Assembly -->
  <line x1="215" y1="376" x2="310" y2="402" stroke="#475569" stroke-width="1.3" marker-end="url(#a)"/>
  <line x1="545" y1="376" x2="460" y2="402" stroke="#475569" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- Prompt Assembly -->
  <rect x="75" y="408" width="610" height="52" rx="8" fill="#0f172a" filter="url(#s)"/>
  <text x="380" y="428" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Prompt Assembly</text>
  <!-- 6 segment pills -->
  <rect x="90"  y="436" width="80" height="16" rx="4" fill="#dbeafe"/>
  <text x="130" y="447" text-anchor="middle" font-size="8" font-weight="500" fill="#1e40af">Kernel</text>
  <rect x="178" y="436" width="80" height="16" rx="4" fill="#e0e7ff"/>
  <text x="218" y="447" text-anchor="middle" font-size="8" font-weight="500" fill="#3730a3">Mode</text>
  <rect x="266" y="436" width="80" height="16" rx="4" fill="#fce7f3"/>
  <text x="306" y="447" text-anchor="middle" font-size="8" font-weight="500" fill="#9d174d">Task</text>
  <rect x="354" y="436" width="80" height="16" rx="4" fill="#fef3c7"/>
  <text x="394" y="447" text-anchor="middle" font-size="8" font-weight="500" fill="#92400e">Context</text>
  <rect x="442" y="436" width="80" height="16" rx="4" fill="#d1fae5"/>
  <text x="482" y="447" text-anchor="middle" font-size="8" font-weight="500" fill="#065f46">Retrieved</text>
  <rect x="530" y="436" width="80" height="16" rx="4" fill="#fee2e2"/>
  <text x="570" y="447" text-anchor="middle" font-size="8" font-weight="500" fill="#991b1b">Tools</text>

  <line x1="380" y1="460" x2="380" y2="478" stroke="#475569" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- Oracle | Snapshot | Trace -->
  <rect x="75"  y="484" width="180" height="28" rx="6" fill="#fff" stroke="#6366f1" stroke-width="1" filter="url(#s)"/>
  <text x="165" y="502" text-anchor="middle" font-size="10" font-weight="600" fill="#4f46e5">Oracle Parity</text>

  <rect x="290" y="484" width="180" height="28" rx="6" fill="#fff" stroke="#0d9488" stroke-width="1" filter="url(#s)"/>
  <text x="380" y="502" text-anchor="middle" font-size="10" font-weight="600" fill="#0d9488">Shadow Snapshot</text>

  <rect x="505" y="484" width="180" height="28" rx="6" fill="#fff" stroke="#475569" stroke-width="1" filter="url(#s)"/>
  <text x="595" y="502" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">Event Trace</text>

  <!-- Arrow: ClawBound -> OpenClaw -->
  <line x1="380" y1="522" x2="380" y2="552" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══════════════════════════════════ -->
  <!-- OPENCLAW HOST RUNTIME               -->
  <!-- ═══════════════════════════════════ -->
  <rect x="55" y="558" width="650" height="56" rx="10" fill="#1e293b" filter="url(#s)"/>
  <text x="380" y="578" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">OpenClaw Host Runtime</text>
  <!-- Module pills -->
  <rect x="100" y="588" width="70"  height="16" rx="3" fill="#334155"/>
  <text x="135" y="599" text-anchor="middle" font-size="8" fill="#94a3b8">Provider</text>
  <rect x="182" y="588" width="55"  height="16" rx="3" fill="#334155"/>
  <text x="210" y="599" text-anchor="middle" font-size="8" fill="#94a3b8">Auth</text>
  <rect x="249" y="588" width="60"  height="16" rx="3" fill="#334155"/>
  <text x="279" y="599" text-anchor="middle" font-size="8" fill="#94a3b8">Model</text>
  <rect x="321" y="588" width="60"  height="16" rx="3" fill="#334155"/>
  <text x="351" y="599" text-anchor="middle" font-size="8" fill="#94a3b8">Tools</text>
  <rect x="393" y="588" width="72"  height="16" rx="3" fill="#334155"/>
  <text x="429" y="599" text-anchor="middle" font-size="8" fill="#94a3b8">Sessions</text>
  <rect x="477" y="588" width="72"  height="16" rx="3" fill="#334155"/>
  <text x="513" y="599" text-anchor="middle" font-size="8" fill="#94a3b8">Gateway</text>
  <rect x="561" y="588" width="72"  height="16" rx="3" fill="#334155"/>
  <text x="597" y="599" text-anchor="middle" font-size="8" fill="#94a3b8">Channels</text>

  <!-- Arrow: OpenClaw -> Output -->
  <line x1="380" y1="614" x2="380" y2="632" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Run Result -->
  <rect x="240" y="636" width="280" height="30" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.2" filter="url(#s)"/>
  <text x="380" y="656" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Run Result</text>
</svg>
