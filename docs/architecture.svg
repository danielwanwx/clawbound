<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" font-family="'Segoe UI', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="500" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="230" y="36" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">ClawBound Architecture</text>
  <text x="230" y="54" text-anchor="middle" fill="#64748b" font-size="12">Deterministic pipeline — no LLM for its own decisions</text>

  <!-- Engine wrapper -->
  <rect x="30" y="68" width="430" height="416" rx="10" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.4"/>
  <text x="44" y="84" fill="#818cf8" font-size="10" font-weight="600" opacity="0.7">ClawBoundEngine — sessions, timing, run_id</text>

  <!-- Input -->
  <rect x="90" y="96" width="310" height="30" rx="15" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="245" y="116" text-anchor="middle" fill="#cbd5e1" font-size="12">EngineRequest { message }</text>

  <!-- Arrow -->
  <line x1="245" y1="126" x2="245" y2="142" stroke="#475569" stroke-width="1.5"/>
  <polygon points="245,148 240,142 250,142" fill="#475569"/>

  <!-- Stage 1 -->
  <rect x="70" y="150" width="350" height="52" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="88" y="170" fill="#60a5fa" font-size="10" font-weight="700">STAGE 1</text>
  <text x="148" y="170" fill="#f1f5f9" font-size="14" font-weight="600">TaskCompiler</text>
  <text x="88" y="190" fill="#94a3b8" font-size="11">Keyword classification — no LLM, fully deterministic</text>

  <!-- Arrow -->
  <line x1="245" y1="202" x2="245" y2="214" stroke="#475569" stroke-width="1.5"/>
  <polygon points="245,220 240,214 250,214" fill="#475569"/>

  <!-- Stage 2 -->
  <rect x="70" y="222" width="350" height="52" rx="8" fill="#2e1065" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="88" y="242" fill="#a78bfa" font-size="10" font-weight="700">STAGE 2</text>
  <text x="148" y="242" fill="#f1f5f9" font-size="14" font-weight="600">PolicyEngine</text>
  <text x="88" y="262" fill="#94a3b8" font-size="11">Budget, tools, iterations — all bounded by policy</text>

  <!-- Arrow -->
  <line x1="245" y1="274" x2="245" y2="286" stroke="#475569" stroke-width="1.5"/>
  <polygon points="245,292 240,286 250,286" fill="#475569"/>

  <!-- Stage 3 -->
  <rect x="70" y="294" width="350" height="52" rx="8" fill="#0c4a6e" stroke="#06b6d4" stroke-width="1.2"/>
  <text x="88" y="314" fill="#22d3ee" font-size="10" font-weight="700">STAGE 3</text>
  <text x="148" y="314" fill="#f1f5f9" font-size="14" font-weight="600">PromptBuilder</text>
  <text x="88" y="334" fill="#94a3b8" font-size="11">Segments admitted, trimmed, or rejected by token budget</text>

  <!-- Arrow -->
  <line x1="245" y1="346" x2="245" y2="358" stroke="#475569" stroke-width="1.5"/>
  <polygon points="245,364 240,358 250,358" fill="#475569"/>

  <!-- Stage 4 -->
  <rect x="70" y="366" width="350" height="56" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="1.8"/>
  <text x="88" y="387" fill="#6ee7b7" font-size="10" font-weight="700">STAGE 4</text>
  <text x="148" y="387" fill="#f1f5f9" font-size="14" font-weight="700">ExecutionLoop</text>
  <text x="88" y="407" fill="#94a3b8" font-size="11">Model ↔ tools ↔ signals, iterates until done</text>

  <!-- Arrow to output -->
  <line x1="245" y1="422" x2="245" y2="440" stroke="#475569" stroke-width="1.5"/>
  <polygon points="245,446 240,440 250,440" fill="#475569"/>

  <!-- Output -->
  <rect x="90" y="448" width="310" height="30" rx="15" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="245" y="468" text-anchor="middle" fill="#cbd5e1" font-size="12">EngineResponse { content, diagnostics }</text>

  <!-- ==================== RIGHT SIDE ==================== -->

  <!-- SessionStore -->
  <rect x="510" y="100" width="310" height="110" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="665" y="124" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="600">SessionStore</text>
  <text x="665" y="144" text-anchor="middle" fill="#fcd34d" font-size="11">Side-channel — not a pipeline stage</text>
  <line x1="530" y1="156" x2="800" y2="156" stroke="#f59e0b" stroke-width="0.5" opacity="0.3"/>
  <text x="665" y="174" text-anchor="middle" fill="#94a3b8" font-size="11">Read history before pipeline runs</text>
  <text x="665" y="192" text-anchor="middle" fill="#94a3b8" font-size="11">Write turn after pipeline completes</text>
  <text x="665" y="206" text-anchor="middle" fill="#78716c" font-size="10">Deterministic compaction — no LLM</text>

  <!-- Dashed arrows: SessionStore ↔ Engine -->
  <path d="M 508 130 L 462 130 L 462 110" stroke="#f59e0b" stroke-width="1" stroke-dasharray="5,3" fill="none"/>
  <polygon points="462,110 457,116 467,116" fill="#f59e0b"/>
  <text x="474" y="124" fill="#fbbf24" font-size="9">read</text>

  <path d="M 462 460 L 480 460 L 480 212 L 508 212" stroke="#f59e0b" stroke-width="1" stroke-dasharray="5,3" fill="none"/>
  <polygon points="508,212 502,207 502,217" fill="#f59e0b"/>
  <text x="488" y="340" fill="#fbbf24" font-size="9" transform="rotate(-90,488,340)">write</text>

  <!-- Provider Adapters -->
  <rect x="510" y="340" width="310" height="106" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
  <text x="665" y="362" text-anchor="middle" fill="#fb923c" font-size="14" font-weight="600">Provider Adapters</text>
  <text x="665" y="380" text-anchor="middle" fill="#94a3b8" font-size="11">Called from ExecutionLoop per iteration</text>

  <!-- Provider chips -->
  <rect x="528" y="392" width="82" height="24" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="569" y="409" text-anchor="middle" fill="#93c5fd" font-size="11">Anthropic</text>
  <rect x="620" y="392" width="66" height="24" rx="12" fill="#2e1065" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="653" y="409" text-anchor="middle" fill="#c4b5fd" font-size="11">Gemini</text>
  <rect x="696" y="392" width="70" height="24" rx="12" fill="#450a0a" stroke="#f87171" stroke-width="0.8"/>
  <text x="731" y="409" text-anchor="middle" fill="#fca5a5" font-size="11">MiniMax</text>

  <text x="665" y="436" text-anchor="middle" fill="#78716c" font-size="10">Swappable via CLAWBOUND_PROVIDER env var</text>

  <!-- Bidirectional arrows: Stage 4 ↔ Provider -->
  <line x1="420" y1="386" x2="506" y2="386" stroke="#f97316" stroke-width="1.5"/>
  <polygon points="508,386 502,381 502,391" fill="#f97316"/>
  <line x1="420" y1="402" x2="506" y2="402" stroke="#f97316" stroke-width="1.5"/>
  <polygon points="422,402 428,397 428,407" fill="#f97316"/>
  <text x="463" y="380" text-anchor="middle" fill="#fdba74" font-size="9">req →</text>
  <text x="463" y="416" text-anchor="middle" fill="#fdba74" font-size="9">← resp</text>
</svg>
