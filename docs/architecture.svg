<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 920" font-family="'Segoe UI', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="compilerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="policyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="promptGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="loopGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="sessionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="providerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="engineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="920" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="550" y="42" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700" letter-spacing="0.5">ClawBound Architecture</text>
  <text x="550" y="64" text-anchor="middle" fill="#64748b" font-size="13">Bounded Sparse-Context Execution Engine</text>

  <!-- Pipeline background -->
  <rect x="60" y="80" width="500" height="810" rx="16" fill="url(#pipeGrad)" stroke="#334155" stroke-width="1"/>
  <text x="310" y="108" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" letter-spacing="1">DETERMINISTIC PIPELINE</text>

  <!-- ═══ User Input ═══ -->
  <rect x="180" y="120" width="260" height="40" rx="20" fill="#1e293b" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="310" y="145" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="500">User Message</text>

  <!-- Arrow: Input → Compiler -->
  <line x1="310" y1="160" x2="310" y2="185" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>

  <!-- ═══ Stage 1: TaskCompiler ═══ -->
  <rect x="130" y="188" width="360" height="72" rx="10" fill="url(#compilerGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="160" y="212" fill="#dbeafe" font-size="11" font-weight="600" letter-spacing="0.5">STAGE 1</text>
  <text x="160" y="230" fill="#ffffff" font-size="15" font-weight="700">TaskCompiler</text>
  <text x="160" y="250" fill="#bfdbfe" font-size="11">Keyword classification → TaskSpec</text>
  <!-- Output badge -->
  <rect x="360" y="210" width="115" height="38" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="417" y="226" text-anchor="middle" fill="#93c5fd" font-size="9" font-weight="600">OUTPUT</text>
  <text x="417" y="241" text-anchor="middle" fill="#dbeafe" font-size="10">TaskSpec (12 fields)</text>

  <!-- Arrow: Compiler → Policy -->
  <line x1="310" y1="260" x2="310" y2="280" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>

  <!-- ═══ Stage 2: PolicyEngine ═══ -->
  <rect x="130" y="283" width="360" height="72" rx="10" fill="url(#policyGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="160" y="307" fill="#ede9fe" font-size="11" font-weight="600" letter-spacing="0.5">STAGE 2</text>
  <text x="160" y="325" fill="#ffffff" font-size="15" font-weight="700">PolicyEngine</text>
  <text x="160" y="345" fill="#c4b5fd" font-size="11">Budget, tools, iterations, scope bounds</text>
  <rect x="360" y="305" width="115" height="38" rx="6" fill="#2e1065" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="417" y="321" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">OUTPUT</text>
  <text x="417" y="336" text-anchor="middle" fill="#ede9fe" font-size="10">RuntimePolicy</text>

  <!-- Arrow: Policy → Prompt -->
  <line x1="310" y1="355" x2="310" y2="375" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>

  <!-- ═══ Stage 3: PromptBuilder ═══ -->
  <rect x="130" y="378" width="360" height="72" rx="10" fill="url(#promptGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="160" y="402" fill="#cffafe" font-size="11" font-weight="600" letter-spacing="0.5">STAGE 3</text>
  <text x="160" y="420" fill="#ffffff" font-size="15" font-weight="700">PromptBuilder</text>
  <text x="160" y="440" fill="#a5f3fc" font-size="11">Segment admission: full | trimmed | rejected</text>
  <rect x="360" y="400" width="115" height="38" rx="6" fill="#083344" stroke="#06b6d4" stroke-width="0.8"/>
  <text x="417" y="416" text-anchor="middle" fill="#67e8f9" font-size="9" font-weight="600">OUTPUT</text>
  <text x="417" y="431" text-anchor="middle" fill="#cffafe" font-size="10">PromptEnvelope</text>

  <!-- Arrow: Prompt → Loop -->
  <line x1="310" y1="450" x2="310" y2="475" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>

  <!-- ═══ Stage 4: ExecutionLoop ═══ -->
  <rect x="100" y="478" width="420" height="180" rx="10" fill="url(#loopGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="135" y="502" fill="#d1fae5" font-size="11" font-weight="600" letter-spacing="0.5">STAGE 4</text>
  <text x="135" y="520" fill="#ffffff" font-size="15" font-weight="700">ExecutionLoop</text>
  <text x="135" y="540" fill="#a7f3d0" font-size="11">Async model ↔ tool interaction</text>

  <!-- Sub-modules inside loop -->
  <rect x="125" y="555" width="130" height="45" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="0.8"/>
  <text x="190" y="575" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">ActionGate</text>
  <text x="190" y="590" text-anchor="middle" fill="#a7f3d0" font-size="9">Risk filter</text>

  <rect x="270" y="555" width="108" height="45" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="0.8"/>
  <text x="324" y="575" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">ToolBroker</text>
  <text x="324" y="590" text-anchor="middle" fill="#a7f3d0" font-size="9">Execute + auth</text>

  <rect x="393" y="555" width="112" height="45" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="0.8"/>
  <text x="449" y="575" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">SignalProc</text>
  <text x="449" y="590" text-anchor="middle" fill="#a7f3d0" font-size="9">Compress output</text>

  <!-- Loop cycle arrows -->
  <path d="M 190 600 L 190 630 L 270 630" stroke="#34d399" stroke-width="1" fill="none" marker-end="url(#arrowGreen)" stroke-dasharray="4 2"/>
  <path d="M 378 630 L 449 630 L 449 600" stroke="#34d399" stroke-width="1" fill="none" marker-end="url(#arrowGreen)" stroke-dasharray="4 2"/>
  <text x="324" y="645" text-anchor="middle" fill="#6ee7b7" font-size="9">gate → execute → signal → model</text>

  <rect x="360" y="490" width="145" height="38" rx="6" fill="#022c22" stroke="#10b981" stroke-width="0.8"/>
  <text x="432" y="506" text-anchor="middle" fill="#34d399" font-size="9" font-weight="600">OUTPUT</text>
  <text x="432" y="521" text-anchor="middle" fill="#d1fae5" font-size="10">LoopResult + Signals</text>

  <!-- Arrow: Loop → Session -->
  <line x1="310" y1="658" x2="310" y2="685" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>

  <!-- ═══ Stage 5: SessionStore ═══ -->
  <rect x="130" y="688" width="360" height="72" rx="10" fill="url(#sessionGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="160" y="712" fill="#fef3c7" font-size="11" font-weight="600" letter-spacing="0.5">STAGE 5</text>
  <text x="160" y="730" fill="#ffffff" font-size="15" font-weight="700">SessionStore</text>
  <text x="160" y="750" fill="#fde68a" font-size="11">Deterministic compaction (no LLM)</text>
  <rect x="360" y="710" width="115" height="38" rx="6" fill="#451a03" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="417" y="726" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">OUTPUT</text>
  <text x="417" y="741" text-anchor="middle" fill="#fef3c7" font-size="10">SessionSnapshot</text>

  <!-- Arrow: Session → Response -->
  <line x1="310" y1="760" x2="310" y2="790" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>

  <!-- ═══ Engine Response ═══ -->
  <rect x="130" y="793" width="360" height="72" rx="10" fill="url(#engineGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="160" y="817" fill="#e0e7ff" font-size="11" font-weight="600" letter-spacing="0.5">ENGINE</text>
  <text x="160" y="835" fill="#ffffff" font-size="15" font-weight="700">EngineResponse</text>
  <text x="160" y="855" fill="#c7d2fe" font-size="11">content, run_id, diagnostics, duration_ms</text>

  <!-- ═══════ Right Panel: Provider Adapters ═══════ -->
  <rect x="600" y="80" width="460" height="340" rx="16" fill="#1a1025" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="830" y="110" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" letter-spacing="1">PROVIDER ADAPTERS</text>

  <!-- Resolver box -->
  <rect x="630" y="125" width="400" height="50" rx="8" fill="url(#providerGrad)" opacity="0.9"/>
  <text x="830" y="148" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">Provider Resolver</text>
  <text x="830" y="166" text-anchor="middle" fill="#fecaca" font-size="10">CLAWBOUND_PROVIDER / CLAWBOUND_MODEL env overrides + key isolation</text>

  <!-- Anthropic -->
  <rect x="630" y="190" width="125" height="80" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.2"/>
  <text x="692" y="215" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="700">Anthropic</text>
  <text x="692" y="232" text-anchor="middle" fill="#94a3b8" font-size="9">Messages API</text>
  <text x="692" y="248" text-anchor="middle" fill="#64748b" font-size="9">api.anthropic.com</text>
  <text x="692" y="262" text-anchor="middle" fill="#64748b" font-size="8">ANTHROPIC_API_KEY</text>

  <!-- Gemini -->
  <rect x="770" y="190" width="125" height="80" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="832" y="215" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">Gemini</text>
  <text x="832" y="232" text-anchor="middle" fill="#94a3b8" font-size="9">OpenAI-compat</text>
  <text x="832" y="248" text-anchor="middle" fill="#64748b" font-size="9">googleapis.com</text>
  <text x="832" y="262" text-anchor="middle" fill="#64748b" font-size="8">GEMINI_API_KEY</text>

  <!-- MiniMax -->
  <rect x="910" y="190" width="120" height="80" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.2"/>
  <text x="970" y="215" text-anchor="middle" fill="#c084fc" font-size="12" font-weight="700">MiniMax</text>
  <text x="970" y="232" text-anchor="middle" fill="#94a3b8" font-size="9">OpenAI-compat</text>
  <text x="970" y="248" text-anchor="middle" fill="#64748b" font-size="9">minimax.io (CN)</text>
  <text x="970" y="262" text-anchor="middle" fill="#64748b" font-size="8">MINIMAX_API_KEY</text>

  <!-- httpx box -->
  <rect x="680" y="290" width="280" height="35" rx="6" fill="#0f172a" stroke="#475569" stroke-width="0.8"/>
  <text x="820" y="312" text-anchor="middle" fill="#64748b" font-size="11">httpx.AsyncClient → translate → normalize</text>

  <!-- Protocol -->
  <rect x="680" y="340" width="280" height="35" rx="6" fill="#1e1b4b" stroke="#6366f1" stroke-width="0.8"/>
  <text x="820" y="362" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="600">ModelAdapter Protocol</text>

  <!-- Connection line: Loop ↔ Provider -->
  <line x1="520" y1="520" x2="600" y2="357" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrowCyan)"/>
  <text x="575" y="425" fill="#22d3ee" font-size="9" transform="rotate(-32, 575, 425)">send(ModelRequest)</text>

  <!-- ═══════ Right Panel: Guardrails ═══════ -->
  <rect x="600" y="440" width="460" height="180" rx="16" fill="#1a0f0f" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="830" y="470" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" letter-spacing="1">DESIGN GUARDRAILS</text>

  <g fill="#f87171" font-size="11" font-weight="600">
    <text x="630" y="500">#1</text>
    <text x="630" y="525">#2</text>
    <text x="630" y="550">#3</text>
    <text x="630" y="575">#4</text>
    <text x="630" y="600">#5</text>
  </g>
  <g fill="#e2e8f0" font-size="11">
    <text x="660" y="500">TaskSpec ≤ 12 fields</text>
    <text x="660" y="525">Rejected segments kept in envelope</text>
    <text x="660" y="550">GenericSignal is fallback only</text>
    <text x="660" y="575">Loop modules closed at 5</text>
    <text x="660" y="600">Deterministic compaction — no LLM</text>
  </g>
  <g fill="#64748b" font-size="9">
    <text x="910" y="500">test assertion</text>
    <text x="910" y="525">segments[] audit</text>
    <text x="910" y="550">signal router</text>
    <text x="910" y="575">interface contract</text>
    <text x="910" y="600">string aggregation</text>
  </g>

  <!-- ═══════ Right Panel: Data Types ═══════ -->
  <rect x="600" y="640" width="460" height="240" rx="16" fill="#0f1720" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="830" y="670" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" letter-spacing="1">SIGNAL TYPES</text>

  <!-- Signal boxes -->
  <rect x="620" y="688" width="130" height="34" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="685" y="710" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">TestResults</text>

  <rect x="760" y="688" width="130" height="34" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="825" y="710" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">BuildOutput</text>

  <rect x="900" y="688" width="130" height="34" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="965" y="710" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">LintOutput</text>

  <rect x="620" y="732" width="130" height="34" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="685" y="754" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">DirListing</text>

  <rect x="760" y="732" width="130" height="34" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="825" y="754" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">JsonResponse</text>

  <rect x="900" y="732" width="130" height="34" rx="6" fill="#1e293b" stroke="#f87171" stroke-width="0.8"/>
  <text x="965" y="754" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">Generic ⚠</text>

  <!-- Compression info -->
  <rect x="620" y="782" width="410" height="80" rx="8" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="825" y="805" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Compression Pipeline</text>
  <text x="825" y="825" text-anchor="middle" fill="#64748b" font-size="10">ToolResult → classify → structured signal → compressed text</text>
  <text x="825" y="845" text-anchor="middle" fill="#64748b" font-size="10">Loss risk: none | low | medium | high (ratio-based assessment)</text>

  <!-- Stats bar -->
  <rect x="60" y="895" width="980" height="1" fill="#334155"/>
  <text x="100" y="912" fill="#475569" font-size="10">31 source files</text>
  <text x="280" y="912" fill="#475569" font-size="10">371 tests (0.3s)</text>
  <text x="460" y="912" fill="#475569" font-size="10">Python ≥3.12</text>
  <text x="620" y="912" fill="#475569" font-size="10">Pydantic v2 (frozen)</text>
  <text x="810" y="912" fill="#475569" font-size="10">httpx async</text>
  <text x="950" y="912" fill="#475569" font-size="10">MIT License</text>
</svg>
